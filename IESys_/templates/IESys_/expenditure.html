{% extends 'IESys_/base.html' %}

{% block page_header %}
<div class="mb-6 md:mb-8">
    <h2 class="text-2xl md:text-3xl font-bold text-slate-800">记一笔支出</h2>
    <p class="text-slate-500 mt-1 text-sm md:text-base">记录你今天产生的消费</p>
</div>
{% endblock %}

{% block context %}

<div class="max-w-lg mx-auto"
     x-data="{
         submitting: false,
         error: '',
         showError: false,
         errorTimer: null,
         handleSubmit() {
             const amount = $refs.amountInput.value;
             if (!amount || parseFloat(amount) <= 0) {
                 this.showErrorMessage('请输入有效的支出金额');
                 return false;
             }
             if (parseFloat(amount) > 99999999.99) {
                 this.showErrorMessage('金额超出允许范围');
                 return false;
             }
             this.submitting = true;
             return true;
         },
         showErrorMessage(msg) {
             this.error = msg;
             this.showError = true;
             if (this.errorTimer) clearTimeout(this.errorTimer);
             this.errorTimer = setTimeout(() => { this.showError = false; }, 3500);
         },
         init() {
             {% if form.errors %}
                 {% for field, errors in form.errors.items %}
                     this.showErrorMessage('{{ errors.0|escapejs }}');
                 {% endfor %}
             {% endif %}
         }
     }">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <!-- 卡片头部 -->
        <div class="bg-red-500 px-6 py-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🛒</span>
                <div>
                    <h3 class="text-white font-bold">支出录入</h3>
                    <p class="text-red-100 text-sm">选择类别并输入金额</p>
                </div>
            </div>
        </div>

        <!-- 表单 -->
        <form action="{% url 'IESys_:expenditure' %}" method="POST" class="p-6" @submit="handleSubmit()">
            {% csrf_token %}

            <!-- 错误提示 -->
            <div x-show="showError"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 -translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 -translate-y-2"
                 class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl flex items-center gap-2 text-red-700 text-sm animate-shake"
                 x-cloak>
                <span>⚠️</span>
                <span x-text="error"></span>
            </div>

            <!-- 支出类别 -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    📂 支出类别
                </label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <label class="relative">
                        <input type="radio" name="expenditure" value="饮食支出" checked
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            🍚 饮食
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="expenditure" value="零食支出"
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            🍿 零食
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="expenditure" value="交通支出"
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            🚌 交通
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="expenditure" value="生活支出"
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            🏠 生活
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="expenditure" value="网购支出"
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            📦 网购
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="expenditure" value="兴趣支出"
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            🎮 兴趣
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="expenditure" value="其他支出"
                               class="peer sr-only">
                        <div class="cursor-pointer text-center py-2.5 px-1 rounded-xl border-2 border-gray-200 text-xs font-medium text-slate-600
                                    peer-checked:border-red-400 peer-checked:bg-red-50 peer-checked:text-red-700
                                    hover:border-gray-300 transition-all">
                            📋 其他
                        </div>
                    </label>
                </div>
            </div>

            <!-- 金额输入 -->
            <div class="mb-6">
                <label for="amount" class="block text-sm font-semibold text-slate-700 mb-2">
                    💵 支出金额
                </label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg font-medium">¥</span>
                    <input type="number"
                           x-ref="amountInput"
                           id="amount"
                           name="expenditure_amount"
                           step="0.01"
                           min="0.01"
                           max="99999999.99"
                           placeholder="0.00"
                           class="w-full pl-10 pr-4 py-3.5 text-2xl font-bold text-slate-800 bg-gray-50 border-2 border-gray-200 rounded-xl
                                  focus:outline-none focus:border-red-400 focus:bg-white focus:ring-4 focus:ring-red-500/10
                                  placeholder:text-slate-300 placeholder:font-normal
                                  transition-all">
                </div>
                <p class="text-xs text-slate-400 mt-1.5">请输入正数金额，最多两位小数</p>
            </div>

            <!-- 隐藏的 income 字段（设为空） -->
            <input type="hidden" name="income" value="">
            <input type="hidden" name="income_amount" value="0">

            <!-- 提交按钮 -->
            <button type="submit"
                    :disabled="submitting"
                    class="w-full py-3.5 bg-red-500 text-white font-bold text-lg rounded-xl
                           hover:bg-red-600 focus:outline-none focus:ring-4 focus:ring-red-500/30
                           disabled:opacity-60 disabled:cursor-not-allowed
                           shadow-lg shadow-red-500/25
                           transition-all hover:-translate-y-0.5 active:translate-y-0">
                <span x-show="!submitting">✅ 确认添加</span>
                <span x-show="submitting" class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    提交中...
                </span>
            </button>
        </form>
    </div>

    <!-- 返回链接 -->
    <div class="mt-4 text-center">
        <a href="{% url 'IESys_:ie' %}" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-slate-600 transition-colors">
            ← 返回收支页面
        </a>
    </div>
</div>

{% endblock context %}
