{% extends 'IESys_/base.html' %}

{% block page_header %}
<div class="mb-6 md:mb-8">
    <h2 class="text-2xl md:text-3xl font-bold text-slate-800">周支出统计</h2>
    <p class="text-slate-500 mt-1 text-sm md:text-base">本周每日支出对比</p>
</div>
{% endblock %}

{% block context %}

<!-- 图表卡片 -->
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6 mb-6 plotly-container">
    {{ fig|safe }}
</div>

<!-- 说明提示 -->
<div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex items-start gap-3">
    <span class="text-xl">💡</span>
    <div>
        <p class="text-sm font-medium text-indigo-800">图表说明</p>
        <p class="text-sm text-indigo-600 mt-0.5">柱状图展示本周每天（周一至周日）的总支出金额，帮你发现高消费日。</p>
    </div>
</div>

<!-- 返回链接 -->
<div class="mt-6">
    <a href="{% url 'IESys_:sta' %}" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-slate-600 transition-colors">
        ← 返回统计页面
    </a>
</div>

{% endblock context %}
