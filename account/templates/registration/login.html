{% extends 'IESys_/base.html' %}

{% block page_header %}{% endblock %}

{% block context %}

<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Logo 区 -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                💰
            </div>
            <h2 class="text-2xl font-bold text-slate-800">登录 IESys</h2>
            <p class="text-slate-500 mt-1">欢迎回来，继续管理你的收支</p>
        </div>

        <!-- 登录表单卡片 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
            {% if form.errors %}
            <div class="mb-5 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
                ⚠️ 用户名或密码不正确，请重试。
            </div>
            {% endif %}

            <form action="{% url 'account:login' %}" method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-sm font-semibold text-slate-700 mb-1.5">
                        👤 用户名
                    </label>
                    <input type="text"
                           name="username"
                           id="id_username"
                           autofocus
                           required
                           class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-slate-800
                                  focus:outline-none focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10
                                  transition-all"
                           placeholder="请输入用户名">
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-semibold text-slate-700 mb-1.5">
                        🔒 密码
                    </label>
                    <input type="password"
                           name="password"
                           id="id_password"
                           required
                           class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl text-slate-800
                                  focus:outline-none focus:border-emerald-500 focus:bg-white focus:ring-4 focus:ring-emerald-500/10
                                  transition-all"
                           placeholder="请输入密码">
                </div>

                <input type="hidden" name="next" value="{{ next|default:'/' }}">

                <button type="submit"
                        class="w-full py-3 bg-emerald-500 text-white font-bold text-lg rounded-xl
                               hover:bg-emerald-600 focus:outline-none focus:ring-4 focus:ring-emerald-500/30
                               shadow-lg shadow-emerald-500/25
                               transition-all hover:-translate-y-0.5 active:translate-y-0">
                    登录
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500">
                    还没有账号？
                    <a href="{% url 'account:register' %}" class="font-semibold text-emerald-600 hover:text-emerald-700 transition-colors">
                        立即注册 →
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock context %}
