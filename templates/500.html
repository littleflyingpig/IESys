{% extends 'IESys_/base.html' %}

{% block page_header %}
<div class="mb-6 md:mb-8">
    <h2 class="text-2xl md:text-3xl font-bold text-slate-800">服务器错误</h2>
    <p class="text-slate-500 mt-1 text-sm md:text-base">500 Internal Server Error</p>
</div>
{% endblock %}

{% block context %}
<div class="text-center py-12 md:py-20">
    <div class="text-7xl mb-6">🔧</div>
    <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-3">服务器出了点问题</h2>
    <p class="text-slate-500 text-lg mb-8 max-w-md mx-auto">
        很抱歉，服务器遇到了一个内部错误。请稍后重试，或联系管理员。
    </p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="{% url 'IESys_:index' %}"
           class="inline-block px-8 py-3 rounded-xl bg-emerald-500 text-white font-semibold hover:bg-emerald-600 shadow-lg shadow-emerald-500/25 transition-all hover:-translate-y-0.5">
            🏠 返回首页
        </a>
        <button onclick="location.reload()"
           class="inline-block px-8 py-3 rounded-xl border-2 border-slate-300 text-slate-700 font-semibold hover:border-slate-400 hover:bg-slate-50 transition-all hover:-translate-y-0.5">
            🔄 刷新页面
        </button>
    </div>
</div>
{% endblock context %}
